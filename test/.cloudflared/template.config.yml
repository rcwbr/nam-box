tunnel: ${TUNNEL_ID}
credentials-file: /etc/cloudflared/${TUNNEL_ID}.json

originRequest:
  originServerName: localhost
  caPool: /etc/nam-box/ssl/server.crt

ingress:
  - hostname: nam-box-dev-webplayer.${NAM_BOX_TUNNEL_DOMAIN}
    service: https://localhost:8443
    originRequest:
      originServerName: localhost

  - hostname: nam-box-dev-jacktrip.${NAM_BOX_TUNNEL_DOMAIN}
    service: udp://localhost:4464

  - service: http_status:404
