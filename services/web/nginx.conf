# HTTP server (port 80 for dev convenience)
# Redirects all HTTP requests to HTTPS, preserving the hostname
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Preserve hostname by redirecting to https://$host$request_uri
    # $host contains the original Host header value
    return 301 https://$host$request_uri;
}

# HTTPS server for web
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;

    ssl_certificate /etc/nam-box/ssl/server.crt;
    ssl_certificate_key /etc/nam-box/ssl/server.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    server_name _;

    absolute_redirect off;

    root /usr/share/nginx/html/web;
    index index.html;

    location /api/bluetooth-manager {
        rewrite ^/api/bluetooth-manager(/.*)$ $1 break;
        proxy_pass http://bluetooth-manager:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors off;
    }

    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;

        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "*";

        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy strict-origin-when-cross-origin;
    }
}