  webplayer-certs:
    image: ghcr.io/rcwbr/nam-box-webplayer:local
    volumes:
      - nambox-ssl:/etc/nam-box/ssl
    environment:
      - HOSTNAME=nam-box.local
    command: >
      sh -c 'mkdir -p /etc/nam-box/ssl &&
             if [ ! -f /etc/nam-box/ssl/server.crt ] || [ ! -f /etc/nam-box/ssl/server.key ]; then
               openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                 -keyout /etc/nam-box/ssl/server.key \
                 -out /etc/nam-box/ssl/server.crt \
                 -subj "/CN=${HOSTNAME}" \
                 -addext "subjectAltName=DNS:localhost,IP:127.0.0.1" &&
               chmod 644 /etc/nam-box/ssl/server.key /etc/nam-box/ssl/server.crt &&
               echo "Certificate generated successfully"
             fi'

  webplayer:
    image: ghcr.io/rcwbr/nam-box-webplayer:local
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - nambox-ssl:/etc/nam-box/ssl
    # environment:
    #   - CODESPACE_NAME=${CODESPACE_NAME}
    depends_on:
      webplayer-certs:
        condition: service_completed_successfully
  jacktrip-hub:
    image: jacktrip/jacktrip
    depends_on:
      webplayer-certs:
        condition: service_completed_successfully
    network_mode: host
    shm_size: 384M
    privileged: true
    environment:
      JACKTRIP_OPTS: --jacktripserver --timeout --zerounderrun --hubpatch 4 --bufstrategy 4 --queue auto --certfile /etc/nam-box/ssl/server.crt --keyfile /etc/nam-box/ssl/server.key
    volumes:
      - nambox-ssl:/etc/nam-box/ssl
